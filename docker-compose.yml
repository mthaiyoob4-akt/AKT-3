version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whichrenewables-prod-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/public:/app/public
      - ./backend/database/persist.json:/app/database/persist.json
    networks:
      - whichrenewables-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_BASE_URL=https://whichrenewables.com/api
        - REACT_APP_API_HOST=https://whichrenewables.com
    container_name: whichrenewables-prod-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - whichrenewables-network

networks:
  whichrenewables-network:
    driver: bridge
